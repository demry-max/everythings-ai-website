services:
  eai-website:
    build: .
    container_name: eai-website
    expose:
      - "80"
    networks:
      - shared-proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  shared-proxy:
    external: true
